host: localhost:8080
info:
  contact: {}
  description: Backend created by Hanif using Gin
  license:
    name: MIT
  title: Backend Ewallet
  version: "1.0"
paths:
  /auth/:
    post:
      consumes:
      - application/json
      description: Login into user for E-Wallet
      parameters:
      - description: login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-github_com_iamhanif11_ewallet-backend_internal_dto_LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      summary: Login into a user
      tags:
      - auth
  /auth/logout:
    delete:
      consumes:
      - application/json
      description: Logout user from E-Wallet and blaclist the token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account for E-Wallet
      parameters:
      - description: register payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.NewUser'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-github_com_iamhanif11_ewallet-backend_internal_dto_User'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      summary: Register a user
      tags:
      - auth
  /transaction/receivers:
    get:
      consumes:
      - application/json
      description: List other users for transfer purpose with search and pagination
      parameters:
      - description: Search keyword by name and phone
        in: query
        name: search
        type: string
      - description: Page Number
        in: query
        name: page
        type: integer
      - description: Max data per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-github_com_iamhanif11_ewallet-backend_internal_dto_ReceiverListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Search and Retriever Receiver List
      tags:
      - transactions
  /user/password:
    patch:
      consumes:
      - application/json
      description: Change the current user password to new password
      parameters:
      - description: Password Update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.UserUpdatePasswordReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update User Password
      tags:
      - user
  /user/pin:
    patch:
      consumes:
      - application/json
      description: Change or set new security PIN for the user
      parameters:
      - description: PIN Update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.UserUpdatePinReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update User PIN
      tags:
      - user
  /user/profile:
    get:
      consumes:
      - application/json
      description: retrieved detailed information of currently logged in
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-github_com_iamhanif11_ewallet-backend_internal_dto_UserProfileRes'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get current user Profile
      tags:
      - user
    patch:
      consumes:
      - multipart/form-data
      description: Update detailed information of the currently logged in user
      parameters:
      - description: Update Fullname
        in: formData
        name: fullname
        type: string
      - description: Update Phone
        in: formData
        name: phone
        type: string
      - description: Update Profile Picture
        in: formData
        name: picture
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-github_com_iamhanif11_ewallet-backend_internal_dto_UserUpdateProfilRes'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update User Profile
      tags:
      - user
  /user/profile/pin/check:
    post:
      consumes:
      - application/json
      description: Verify if the provided pin is correct for the logged in user
      parameters:
      - description: PIN payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.UserCheckPinReq'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-github_com_iamhanif11_ewallet-backend_internal_dto_UserCheckPinRes'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Check pin user
      tags:
      - user
  /user/reports:
    get:
      description: Retrieve transaction reports with duration
      parameters:
      - default: 7d
        description: Duration of report, default is 7d
        in: query
        name: duration
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-array_github_com_iamhanif11_ewallet-backend_internal_dto_UserTransactionReportRes'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get User Transaction Report
      tags:
      - user
  /user/wallet:
    get:
      description: Retrieve data for the user dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.Response-github_com_iamhanif11_ewallet-backend_internal_dto_UserDashboardInformationRes'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_iamhanif11_ewallet-backend_internal_dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get user Dashboard information
      tags:
      - user
securityDefinitions:
  ApiKeyAuth:
    description: Bearer token used for authorization
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
